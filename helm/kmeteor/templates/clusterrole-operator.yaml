# Fixed ClusterRole for the operator — manages KMeteor CRs and CronJobs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kmeteor.fullname" . }}-operator
  labels:
    {{- include "kmeteor.labels" . | nindent 4 }}
rules:
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors/finalizers"]
    verbs: ["update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
