---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: kmeteors.kmeteor.io
spec:
  group: kmeteor.io
  names:
    kind: KMeteor
    listKind: KMeteorList
    plural: kmeteors
    singular: kmeteor
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.lambda
      name: Lambda
      type: number
    - jsonPath: .spec.interval
      name: Interval
      type: string
    - jsonPath: .status.lastScheduleTime
      name: LastSchedule
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KMeteor is the Schema for the kmeteors API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: KMeteorSpec defines the desired state of KMeteor.
            properties:
              actions:
                description: |-
                  Actions is the list of chaos workloads the controller may schedule.
                  Each CronJob event picks one action at random, weighted by Weight.
                  If empty, the job falls back to printing "fired" (no-op useful for testing).
                items:
                  description: ChaosAction defines a single chaos workload executed by a scheduled CronJob.
                  properties:
                    args:
                      description: Args are additional arguments passed to Command.
                      items:
                        type: string
                      type: array
                    command:
                      description: Command is the entrypoint for the chaos container.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    image:
                      description: Image is the container image used to execute the chaos command.
                      type: string
                    name:
                      description: Name is a human-readable label for this action (used in logs and events).
                      type: string
                    weight:
                      default: 1
                      description: |-
                        Weight controls the relative selection probability when multiple actions are
                        defined. A higher value increases the chance of this action being chosen.
                        Defaults to 1.
                      format: int32
                      minimum: 1
                      type: integer
                  required:
                  - command
                  - image
                  - name
                  type: object
                type: array
              interval:
                description: |-
                  Interval is the time window over which Lambda events are expected on average.
                  The controller reconciles every Interval and schedules jobs for the next window.
                type: string
              lambda:
                description: Lambda is the average number of events per Interval (Poisson process rate).
                format: double
                minimum: 0.001
                type: number
            required:
            - interval
            - lambda
            type: object
          status:
            description: KMeteorStatus defines the observed state of KMeteor.
            properties:
              lastScheduleTime:
                description: LastScheduleTime is when the controller last generated the schedule.
                format: date-time
                type: string
              scheduledJobs:
                description: ScheduledJobs holds the names of CronJobs created in the current interval.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
