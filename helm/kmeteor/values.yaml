replicaCount: 1

image:
  repository: kmeteor
  tag: "latest"
  pullPolicy: Never

# ServiceAccount the operator pod itself runs as.
# Its RBAC is fixed (manage KMeteors + CronJobs) and not user-configurable.
operatorServiceAccount:
  name: kmeteor-controller-manager

# ServiceAccount assigned to every CronJob spawned by the operator.
# Kept separate from the operator SA so job permissions can be scoped freely.
jobServiceAccount:
  name: kmeteor-job

# ── CronJob RBAC ────────────────────────────────────────────────────────────
# Configure what permissions the scheduled CronJobs have.
#
# clusterScoped: true  → creates a ClusterRole  + ClusterRoleBinding
#                false → creates a Role         + RoleBinding
#                        (limited to the namespace where the CR lives)
#
# rules: standard Kubernetes RBAC policy rules appended to the role.
#        By default the list is empty — the CronJob pod just prints "fired"
#        and needs no cluster access.
#
# ── Chaos profiles ──────────────────────────────────────────────────────────
# Each profile below shows the jobRbac.rules required for the matching
# ChaosAction entries you put in the KMeteor CR spec.actions field.
# The blast radius is strictly bounded by what RBAC allows.
#
# Profile A — pod-chaos (namespace-scoped)
#   Deletes a random running Pod; tests workload self-healing.
#   jobRbac:
#     clusterScoped: false
#     rules:
#       - apiGroups: [""]
#         resources: ["pods"]
#         verbs: ["get", "list", "delete"]
#
#   KMeteor CR spec.actions entry:
#     - name: delete-random-pod
#       image: bitnami/kubectl:latest
#       weight: 1
#       command:
#         - sh
#         - -c
#         - |
#           kubectl get pods --field-selector=status.phase=Running -o name \
#             | shuf -n1 | xargs -r kubectl delete --grace-period=0 --force
#
# Profile B — deployment-chaos (namespace-scoped)
#   Scales a random Deployment to 0; tests HPA / alert coverage.
#   jobRbac:
#     clusterScoped: false
#     rules:
#       - apiGroups: ["apps"]
#         resources: ["deployments"]
#         verbs: ["get", "list", "patch", "update"]
#
#   KMeteor CR spec.actions entry:
#     - name: scale-deployment-zero
#       image: bitnami/kubectl:latest
#       weight: 1
#       command:
#         - sh
#         - -c
#         - |
#           kubectl get deployments -o name | shuf -n1 \
#             | xargs -r sh -c 'kubectl scale "$1" --replicas=0' --
#
# Profile C — configmap-chaos (namespace-scoped)
#   Injects a stale key into a random ConfigMap; tests config-reload handling.
#   jobRbac:
#     clusterScoped: false
#     rules:
#       - apiGroups: [""]
#         resources: ["configmaps"]
#         verbs: ["get", "list", "patch"]
#
#   KMeteor CR spec.actions entry:
#     - name: corrupt-configmap
#       image: bitnami/kubectl:latest
#       weight: 1
#       command:
#         - sh
#         - -c
#         - |
#           CM=$(kubectl get configmaps -o name | grep -v kube-root-ca | shuf -n1)
#           [ -n "$CM" ] && kubectl patch $CM --type=merge \
#             -p "{\"data\":{\"chaos\":\"$(date -u +%FT%TZ)\"}}"
#
# Profile D — networkpolicy-chaos (namespace-scoped)
#   Deletes a random NetworkPolicy; tests whether missing policies open unwanted paths.
#   jobRbac:
#     clusterScoped: false
#     rules:
#       - apiGroups: ["networking.k8s.io"]
#         resources: ["networkpolicies"]
#         verbs: ["get", "list", "delete"]
#
#   KMeteor CR spec.actions entry:
#     - name: delete-networkpolicy
#       image: bitnami/kubectl:latest
#       weight: 1
#       command:
#         - sh
#         - -c
#         - |
#           kubectl get networkpolicies -o name | shuf -n1 | xargs -r kubectl delete
#
# Profile E — node-chaos (cluster-scoped)
#   Cordons a random node; tests pod eviction and rescheduling.
#   jobRbac:
#     clusterScoped: true
#     rules:
#       - apiGroups: [""]
#         resources: ["nodes"]
#         verbs: ["get", "list", "patch"]
#
#   KMeteor CR spec.actions entry:
#     - name: cordon-random-node
#       image: bitnami/kubectl:latest
#       weight: 1
#       command:
#         - sh
#         - -c
#         - |
#           kubectl get nodes -o name | shuf -n1 | xargs -r kubectl cordon
# ────────────────────────────────────────────────────────────────────────────
jobRbac:
  clusterScoped: false
  rules: []

# ── Multi-tenancy ────────────────────────────────────────────────────────────
# When enabled, a ClusterRole is created that grants KMeteor CR management
# permissions. Bind it per-namespace with a RoleBinding to give tenants access
# without touching the operator namespace.
#
# Tenants must:
#   1. Create a ServiceAccount + Role + RoleBinding in their own namespace
#      for the chaos job pod (the SA they reference in spec.jobServiceAccountName).
#   2. Deploy their KMeteor CR with spec.jobServiceAccountName pointing to that SA.
#
# Example RoleBinding for a tenant namespace:
#   kubectl create rolebinding kmeteor-tenant \
#     --clusterrole=kmeteor-tenant \
#     --serviceaccount=<tenant-ns>:<tenant-user> \
#     --namespace=<tenant-ns>
# ─────────────────────────────────────────────────────────────────────────────
tenantAccess:
  enabled: false

leaderElection: false

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Namespace the operator is deployed into.
# The CRD and ClusterRole(Binding) are cluster-scoped regardless.
namespace: kmeteor-system
