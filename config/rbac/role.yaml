---
# Cluster-scoped permission to manage the CRD itself (needed to list/watch across namespaces).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kmeteor-manager-role
rules:
  # KMeteor CRD
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kmeteor.io"]
    resources: ["kmeteors/finalizers"]
    verbs: ["update"]
  # CronJobs (namespace-scoped but listed via ClusterRole for simplicity)
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
